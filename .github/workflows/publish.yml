name: dispatch
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**/*.js'
      - 'types/**/*.d.ts'

# id-token: write lets npm authenticate to the registry over OIDC (trusted
# publishing) with no long-lived NPM_TOKEN, and enables build provenance.
# contents: write lets the changelog action push the release commit and tag.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) requires npm >= 11.5.1, newer than the npm
      # bundled with the Node runtime.
      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn run lint
      - name: Test
        run: yarn run jest --collectCoverage
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Generate changelog and bump version
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          git-message: 'chore(release): {version}'
          output-file: 'CHANGELOG.md'
          release-count: '0'
          skip-on-empty: 'false'
      - name: Publish to npm via trusted publishing
        run: yarn run dispatch-lib
      - name: Create GitHub release
        if: steps.changelog.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          token: ${{ secrets.RELEASE_TOKEN }}
