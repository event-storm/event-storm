name: dispatch
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**/*.js'
      - 'types/**/*.d.ts'

# id-token: write lets npm authenticate to the registry over OIDC (trusted
# publishing) with no long-lived NPM_TOKEN, and enables build provenance.
# contents: write lets the changelog action push the release commit and tag.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      # No registry-url here on purpose: it would write an .npmrc with a
      # placeholder _authToken that shadows OIDC on the registry PUT and makes
      # trusted publishing fail with a permission 404. The publish targets the
      # npm registry explicitly via the --registry flag in dispatch-lib instead.
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Trusted publishing (OIDC) requires npm >= 11.5.1, newer than the npm
      # bundled with the Node runtime. Pin to 11.x: npm 12.0.0 unbundled the
      # sigstore module, so it crashes with MODULE_NOT_FOUND when generating
      # the provenance that trusted publishing enables automatically.
      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn run lint
      - name: Test
        run: yarn run jest --collectCoverage
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Generate changelog and bump version
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          git-message: 'chore(release): {version}'
          output-file: 'CHANGELOG.md'
          release-count: '0'
          skip-on-empty: 'false'
      - name: Build package
        run: yarn run build
      # Publish with npm directly, NOT via `yarn run`: yarn injects
      # npm_config_registry=registry.yarnpkg.com into the script env, which
      # stops npm's OIDC trusted-publishing detection from engaging (it only
      # runs against the npm registry). Invoked directly, npm uses its default
      # registry and authenticates over OIDC with no token.
      - name: Publish to npm via trusted publishing
        run: npm publish --access public
        working-directory: dist
      - name: Create GitHub release
        if: steps.changelog.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          token: ${{ secrets.RELEASE_TOKEN }}
